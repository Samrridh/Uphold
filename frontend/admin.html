<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Admin - Sign Document</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <h1>Sign & Certify Document</h1>
            <p>Upload a document to certify it officially.</p>

            <input type="file" id="fileInput">
            <button type="button" onclick="signDocument()">Sign Document</button>

            <div id="result" class="result hidden"></div>
        </div>
        
        <script>
            const API = `${location.protocol}//${location.hostname}:8000`

            function apiDetailMessage(data) {
                const d = data && data.detail
                if (typeof d === 'string') return d
                if (Array.isArray(d)) return d.map((e) => e.msg || JSON.stringify(e)).join('; ')
                if (d != null) return JSON.stringify(d)
                return 'Request failed'
            }

            async function signDocument() {
                const file = document.getElementById('fileInput').files[0]
                if (!file) return alert('Please select a file')

                const resultDiv = document.getElementById('result')
                resultDiv.className = 'result hidden'
                resultDiv.textContent = ''

                try {
                    const formData = new FormData()
                    formData.append('file', file)

                    const res = await fetch(`${API}/api/sign`, {
                        method: 'POST',
                        body: formData,
                    })
                    let data = {}
                    try {
                        data = await res.json()
                    } catch {
                        resultDiv.className = 'result danger'
                        resultDiv.textContent =
                            `Server returned non-JSON (${res.status}). Is the API running on port 8000?`
                        return
                    }

                    if (res.ok) {
                        resultDiv.className = 'result success'
                        resultDiv.innerHTML = `
                    Document certified successfully<br>
                    <strong>Hash:</strong> ${data.doc_hash}<br>
                    <strong>Signed at:</strong> ${new Date(data.signed_at).toDateString()}
                    `
                    } else {
                        resultDiv.className = 'result danger'
                        resultDiv.textContent = apiDetailMessage(data)
                    }
                } catch (err) {
                    resultDiv.className = 'result danger'
                    resultDiv.textContent =
                        err.message ||
                        'Could not reach the API. Start uvicorn from the project root: uvicorn app.main:app --reload'
                }
            }
        </script>
    </body>
</html>
